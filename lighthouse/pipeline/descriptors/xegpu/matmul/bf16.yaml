# XeGPU pipeline for level1-1 benchmark (4k matmul)
Pipeline:
  - schedule: "xegpu/mlp_schedule.py[gen=matmul_schedule] {
                                                        payload_func_name=main
                                                        m=4096
                                                        n=4096
                                                        k=4096
                                                        wg_m=256
                                                        wg_n=256
                                                        sg_m=32
                                                        sg_n=64
                                                        k_tile=32
                                                        load_a_m=32
                                                        load_a_k=32
                                                        load_b_k=16
                                                        load_b_n=32
                                                        prefetch_a_m=16
                                                        prefetch_a_k=16
                                                        prefetch_b_k=16
                                                        prefetch_b_n=16
                                                        prefetch_a_nb=1
                                                        prefetch_b_nb=2
                                                        transpose_a=false
                                                        transpose_b=false
                                                       }"
  - schedule: "xegpu/xegpu_to_binary.py[gen=xegpu_to_binary] {
                                                         xegpu_op_level=workgroup
                                                         large_register_file=true
                                                       }"
