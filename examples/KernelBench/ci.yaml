- kernel: level1/1_Square_matrix_multiplication_.py
  input_shapes: [128x128, 128x128]
  initializations: [rnd, id]
  output_shape: 128x128
  gflops: (128 * 128 * 128 * 2) / 1e9
  pipeline: matmul

- kernel: level1/2_Standard_matrix_multiplication_.py
  input_shapes: [64x128, 128x256]
  initializations: [rnd, rnd]
  output_shape: 64x256
  gflops: (64 * 128 * 256 * 2) / 1e9
  pipeline: matmul

- kernel: level1/3_Batched_matrix_multiplication.py
  input_shapes: [3x64x128, 3x128x64]
  initializations: [rnd, rnd]
  output_shape: 3x64x64
  gflops: (3 * 64 * 128 * 64 * 2) / 1e9
  pipeline: batch_matmul

- kernel: level1/4_Matrix_vector_multiplication_.py
  input_shapes: [64x128, 128x1]
  initializations: [rnd, rnd]
  output_shape: 64x1
  gflops: (64 * 128 * 1 * 2) / 1e9
  pipeline: matvec

- kernel: level1/5_Matrix_scalar_multiplication.py
  input_shapes: [64x512, "1"]
  initializations: [rnd, rnd]
  output_shape: 64x512
  gflops: (64 * 512) / 1e9
  pipeline: element_wise
